name: Build DXVK GPLAsync WCP

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: DXVK GPLAsync repository URL
        required: false
        default: https://gitlab.com/Ph42oN/dxvk-gplasync.git
        type: string
      ref:
        description: Git branch, tag, or commit to build
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: build-dxvk-gplasync-wcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    outputs:
      version: ${{ steps.meta.outputs.version }}
      commit: ${{ steps.meta.outputs.commit }}

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            glslang-tools \
            libvulkan-dev \
            meson \
            mingw-w64 \
            ninja-build \
            pkg-config \
            python3 \
            wine64 \
            xz-utils

      - name: Clone DXVK GPLAsync
        run: |
          set -euxo pipefail
          git clone --recursive "${{ inputs.repo_url }}" dxvk-gplasync
          cd dxvk-gplasync
          if [ -n "${{ inputs.ref }}" ]; then
            git checkout "${{ inputs.ref }}"
          fi

      - name: Derive package metadata
        id: meta
        working-directory: dxvk-gplasync
        run: |
          set -euxo pipefail
          commit_sha="$(git rev-parse --short HEAD)"
          version="$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)"
          version="${version#v}"
          version="${version//\//-}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit_sha" >> "$GITHUB_OUTPUT"

      - name: Build and package x64 WCP
        run: |
          set -euxo pipefail

          repo_url="${{ inputs.repo_url }}"
          build_ref="${{ inputs.ref }}"
          build_version="${{ steps.meta.outputs.version }}"
          commit_sha="${{ steps.meta.outputs.commit }}"

          stage_root="$RUNNER_TEMP/dxvk-wcp-stage-x64"
          dist_dir="$RUNNER_TEMP/dxvk-wcp-dist"
          package_root="dxvk-$build_version"
          package_name="dxvk-gplasync-$build_version-x86_64.wcp"

          rm -rf "$stage_root" "$dist_dir"
          mkdir -p "$stage_root" "$dist_dir"

          cd dxvk-gplasync
          ./package-release.sh "$build_version" "$stage_root" --no-package --64-only

          cat > "$stage_root/$package_root/profile.json" <<EOF
          {
            "type": "DXVK",
            "arch": "x86_64",
            "verName": "${build_version}-x86_64-gplasync",
            "verCode": 1,
            "source": "$repo_url",
            "ref": "${build_ref:-default}",
            "commit": "$commit_sha"
          }
          EOF

          tar -cJf "$dist_dir/$package_name" -C "$stage_root" "$package_root"

          ls -lh "$dist_dir"

      - name: Upload x64 WCP artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxvk-gplasync-x64
          path: ${{ runner.temp }}/dxvk-wcp-dist/*.wcp
          if-no-files-found: error
          retention-days: 14

  build_arm64ec:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    outputs:
      version: ${{ steps.meta.outputs.version }}
      commit: ${{ steps.meta.outputs.commit }}

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            glslang-tools \
            libvulkan-dev \
            meson \
            ninja-build \
            pkg-config \
            python3 \
            tar \
            xz-utils

      - name: Install ARM64EC toolchain
        run: |
          set -euxo pipefail
          toolchain_root="$RUNNER_TEMP/llvm-mingw"
          archive="$RUNNER_TEMP/llvm-mingw.tar.xz"

          curl -L \
            -o "$archive" \
            https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-aarch64.tar.xz

          mkdir -p "$toolchain_root"
          tar -xJf "$archive" -C "$toolchain_root" --strip-components=1

          wrapper_dir="$RUNNER_TEMP/arm64ec-wrappers"
          mkdir -p "$wrapper_dir"
          cat > "$wrapper_dir/aarch64-linux-gnu-pkg-config" <<'EOF'
          #!/usr/bin/env bash
          exec pkg-config "$@"
          EOF
          chmod +x "$wrapper_dir/aarch64-linux-gnu-pkg-config"

          echo "$wrapper_dir" >> "$GITHUB_PATH"
          echo "$toolchain_root/bin" >> "$GITHUB_PATH"

      - name: Clone DXVK GPLAsync
        run: |
          set -euxo pipefail
          git clone --recursive "${{ inputs.repo_url }}" dxvk-gplasync
          cd dxvk-gplasync
          if [ -n "${{ inputs.ref }}" ]; then
            git checkout "${{ inputs.ref }}"
          fi

      - name: Derive package metadata
        id: meta
        working-directory: dxvk-gplasync
        run: |
          set -euxo pipefail
          commit_sha="$(git rev-parse --short HEAD)"
          version="$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)"
          version="${version#v}"
          version="${version//\//-}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit_sha" >> "$GITHUB_OUTPUT"

      - name: Build and package ARM64EC WCP
        run: |
          set -euxo pipefail

          repo_url="${{ inputs.repo_url }}"
          build_ref="${{ inputs.ref }}"
          build_version="${{ steps.meta.outputs.version }}"
          commit_sha="${{ steps.meta.outputs.commit }}"

          stage_root="$RUNNER_TEMP/dxvk-wcp-stage-arm64ec"
          dist_dir="$RUNNER_TEMP/dxvk-wcp-dist"
          package_root="dxvk-$build_version"
          package_name="dxvk-gplasync-$build_version-arm64ec.wcp"
          build_dir="$RUNNER_TEMP/dxvk-arm64ec-build"
          cross_file="$RUNNER_TEMP/dxvk-arm64ec-cross.txt"

          rm -rf "$stage_root" "$dist_dir" "$build_dir"
          mkdir -p "$stage_root" "$dist_dir" "$build_dir"

          cat > "$cross_file" <<'EOF'
          [binaries]
          ar = 'arm64ec-w64-mingw32-ar'
          c = 'arm64ec-w64-mingw32-gcc'
          cpp = 'arm64ec-w64-mingw32-g++'
          ld = 'arm64ec-w64-mingw32-ld'
          windres = 'arm64ec-w64-mingw32-windres'
          strip = 'strip'
          widl = 'arm64ec-w64-mingw32-widl'
          pkgconfig = 'aarch64-linux-gnu-pkg-config'

          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF

          cd dxvk-gplasync
          meson setup \
            --cross-file "$cross_file" \
            --buildtype release \
            --prefix "$stage_root/$package_root" \
            --bindir x64 \
            --libdir x64 \
            -Db_ndebug=if-release \
            -Dbuild_id=false \
            "$build_dir"

          ninja -C "$build_dir" install

          find "$stage_root/$package_root" -name '*.a' -delete

          cat > "$stage_root/$package_root/profile.json" <<EOF
          {
            "type": "DXVK",
            "arch": "arm64ec",
            "verName": "${build_version}-arm64ec-gplasync",
            "verCode": 1,
            "source": "$repo_url",
            "ref": "${build_ref:-default}",
            "commit": "$commit_sha"
          }
          EOF

          tar -cJf "$dist_dir/$package_name" -C "$stage_root" "$package_root"

          ls -lh "$dist_dir"

      - name: Upload ARM64EC WCP artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxvk-gplasync-arm64ec
          path: ${{ runner.temp }}/dxvk-wcp-dist/*.wcp
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [build_x64, build_arm64ec]
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: dxvk-gplasync-x64
          path: ${{ runner.temp }}/release-assets

      - name: Download ARM64EC artifact
        uses: actions/download-artifact@v4
        with:
          name: dxvk-gplasync-arm64ec
          path: ${{ runner.temp }}/release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dxvk-gplasync-${{ needs.build_x64.outputs.version }}
          name: DXVK GPLAsync ${{ needs.build_x64.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: ${{ runner.temp }}/release-assets/**/*.wcp
          generate_release_notes: true
          fail_on_unmatched_files: true
